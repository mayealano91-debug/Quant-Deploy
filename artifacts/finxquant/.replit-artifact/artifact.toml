kind = "web"
previewPath = "/"
title = "FINxQUANT"
version = "1.0.0"
id = "artifacts/finxquant"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22011

[services.development]
run = "pnpm --filter @workspace/finxquant run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/finxquant", "run", "build" ]
publicDir = "artifacts/finxquant/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22011"
BASE_PATH = "/"
